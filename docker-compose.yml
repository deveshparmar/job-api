services:
  postgres:
    image: postgres:15
    container_name: job-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobs

  redis:
    image: redis:7
    container_name: job-redis
    ports:
      - "6379:6379"
